apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-config
          image: ghcr.io/openclaw/openclaw:2026.3.1
          command:
            - sh
            - -c
            - |
              log() { echo "[$(date -Iseconds)] [init-config] $*"; }
              log "Starting config initialization"
              mkdir -p /home/node/.openclaw
              if [ -f /home/node/.openclaw/openclaw.json ]; then
                log "Mode: merge - merging config with existing"
                node -e "
                  const fs = require('fs');
                  const stripComments = (s) => {
                    let r = '', q = false, i = 0;
                    while (i < s.length) {
                      if (q) {
                        if (s[i] === '\\\\') { r += s[i] + s[i+1]; i += 2; continue; }
                        if (s[i] === '\"') q = false;
                        r += s[i++];
                      } else if (s[i] === '\"') {
                        q = true; r += s[i++];
                      } else if (s[i] === '/' && s[i+1] === '/') {
                        while (i < s.length && s[i] !== '\n') i++;
                      } else { r += s[i++]; }
                    }
                    return r;
                  };
                  let existing;
                  try {
                    existing = JSON.parse(stripComments(fs.readFileSync('/home/node/.openclaw/openclaw.json', 'utf8')));
                  } catch (e) {
                    console.error('[init-config] Warning: existing config is not valid JSON, will overwrite');
                    process.exit(1);
                  }
                  const helm = JSON.parse(stripComments(fs.readFileSync('/config/openclaw.json', 'utf8')));
                  const deepMerge = (target, source) => {
                    for (const key of Object.keys(source)) {
                      if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                        target[key] = target[key] || {};
                        deepMerge(target[key], source[key]);
                      } else {
                        target[key] = source[key];
                      }
                    }
                    return target;
                  };
                  const merged = deepMerge(existing, helm);
                  fs.writeFileSync('/home/node/.openclaw/openclaw.json', JSON.stringify(merged, null, 2));
                " && log "Config merged successfully" || {
                  log "WARNING: Merge failed, falling back to overwrite"
                  cp /config/openclaw.json /home/node/.openclaw/openclaw.json
                }
              else
                log "Fresh install - writing initial config"
                cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              fi
              # Seed SOUL.md into workspace (always overwrite from ConfigMap)
              mkdir -p /home/node/.openclaw/workspace
              cp /config/SOUL.md /home/node/.openclaw/workspace/SOUL.md
              log "SOUL.md seeded into workspace"
              log "Config initialization complete"
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.1
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENROUTER_API_KEY
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: SLACK_BOT_TOKEN
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: SLACK_APP_TOKEN
          ports:
            - containerPort: 18789
              name: gateway
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: config
          configMap:
            name: openclaw-config
