apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: openclaw
          image: openclaw/openclaw:latest  # TODO: pin to specific version
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENROUTER_API_KEY
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: SLACK_BOT_TOKEN
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: SLACK_APP_TOKEN
            - name: OPENCLAW_HOME
              value: /data/openclaw
          ports:
            - containerPort: 18789
              name: gateway
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/openclaw/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: system-prompt
              mountPath: /etc/openclaw/system-prompt.txt
              subPath: system-prompt.txt
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: config
          configMap:
            name: openclaw-config
        - name: system-prompt
          configMap:
            name: openclaw-system-prompt
