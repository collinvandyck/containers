apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  config.yaml: |
    llm:
      provider: openrouter
      model: anthropic/claude-sonnet-4

    channels:
      slack:
        enabled: true
        mode: socket
        requireMention: true
        mentionPatterns:
          - "dopeclaw"

    agents:
      defaults:
        sandbox:
          workspaceAccess: rw
