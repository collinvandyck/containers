apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "openrouter/anthropic/claude-3.5-haiku"
          },
          "sandbox": {
            "workspaceAccess": "rw"
          }
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "identity": {
              "name": "dopeclaw",
              "emoji": "🐾"
            }
          }
        ]
      },
      "channels": {
        "slack": {
          "enabled": true,
          "mode": "socket",
          "requireMention": true,
          "groupPolicy": "open",
          "replyToMode": "all"
        }
      }
    }
